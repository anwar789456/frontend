<div class="p-8 max-w-2xl">
  <!-- Header -->
  <div class="flex items-center gap-3 mb-6">
    <a routerLink="/tutor/quiz" class="p-2 text-gray-400 hover:text-gray-600 hover:bg-gray-100 rounded-lg transition-colors">
      <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
        <path stroke-linecap="round" stroke-linejoin="round" d="M15.75 19.5L8.25 12l7.5-7.5" />
      </svg>
    </a>
    <div>
      <h1 class="text-2xl font-bold text-[#0f1724] font-['SN_Pro']">{{ isEditMode ? 'Edit Quiz' : 'Create Quiz' }}</h1>
      <p class="text-sm text-gray-500 mt-0.5">{{ isEditMode ? 'Update quiz details.' : 'Set up a new quiz for your students.' }}</p>
    </div>
  </div>

  @if (isLoading) {
    <div class="flex items-center justify-center py-20">
      <div class="w-8 h-8 border-3 border-[#38a9f3] border-t-transparent rounded-full animate-spin"></div>
    </div>
  } @else {
    <form [formGroup]="quizForm" (ngSubmit)="save()" class="bg-white border border-gray-200 rounded-2xl p-6">
      <div class="flex flex-col gap-5">
        <!-- Title -->
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1.5">Title <span class="text-red-400">*</span></label>
          <input formControlName="title" type="text" placeholder="e.g. Everyday Vocabulary Quiz"
            class="w-full px-4 py-2.5 border border-gray-300 rounded-xl text-sm outline-none focus:border-[#38a9f3] focus:ring-1 focus:ring-[#38a9f3]/30 transition-colors" />
        </div>

        <!-- Description -->
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1.5">Description</label>
          <textarea formControlName="description" rows="3" placeholder="Describe what this quiz covers..."
            class="w-full px-4 py-2.5 border border-gray-300 rounded-xl text-sm outline-none focus:border-[#38a9f3] focus:ring-1 focus:ring-[#38a9f3]/30 resize-none transition-colors"></textarea>
        </div>

        <!-- Level + Status row -->
        <div class="grid grid-cols-2 gap-4">
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1.5">Level <span class="text-red-400">*</span></label>
            <select formControlName="level"
              class="w-full px-4 py-2.5 border border-gray-300 rounded-xl text-sm outline-none focus:border-[#38a9f3] focus:ring-1 focus:ring-[#38a9f3]/30 transition-colors">
              @for (lvl of quizLevels; track lvl) {
                <option [value]="lvl">{{ lvl }}</option>
              }
            </select>
          </div>
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1.5">Status <span class="text-red-400">*</span></label>
            <select formControlName="status"
              class="w-full px-4 py-2.5 border border-gray-300 rounded-xl text-sm outline-none focus:border-[#38a9f3] focus:ring-1 focus:ring-[#38a9f3]/30 transition-colors">
              @for (s of quizStatuses; track s) {
                <option [value]="s">{{ s }}</option>
              }
            </select>
          </div>
        </div>

        <!-- XP Reward -->
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1.5">XP Reward</label>
          <input formControlName="xpReward" type="number" min="0" placeholder="0"
            class="w-full px-4 py-2.5 border border-gray-300 rounded-xl text-sm outline-none focus:border-[#38a9f3] focus:ring-1 focus:ring-[#38a9f3]/30 transition-colors" />
        </div>

        <!-- Buttons -->
        <div class="flex items-center gap-3 pt-2">
          <button type="submit" [disabled]="quizForm.invalid || isSaving"
            class="px-6 py-2.5 text-sm font-semibold text-white bg-[#38a9f3] rounded-xl hover:bg-[#2196e3] transition-colors disabled:opacity-50 disabled:cursor-not-allowed">
            {{ isSaving ? 'Saving...' : (isEditMode ? 'Update Quiz' : 'Create Quiz') }}
          </button>
          <a routerLink="/tutor/quiz"
            class="px-6 py-2.5 text-sm font-semibold text-gray-600 border border-gray-300 rounded-xl hover:bg-gray-50 transition-colors">
            Cancel
          </a>
        </div>
      </div>
    </form>
  }
</div>
