<div class="min-h-screen flex items-center justify-center bg-gray-50 px-4">
  <div class="w-full max-w-md bg-white rounded-2xl shadow-lg p-8">

    <!-- Header -->
    <div class="text-center mb-8">
      <div class="w-16 h-16 bg-blue-100 rounded-full flex items-center justify-center mx-auto mb-4">
        <svg class="w-8 h-8 text-blue-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
            d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"/>
        </svg>
      </div>
      <h1 class="text-2xl font-bold text-gray-900">Verify your email</h1>
      <p class="text-gray-500 mt-2 text-sm">
        We sent a 6-digit code to
      </p>
      <p class="text-blue-600 font-semibold text-sm mt-1">{{ email }}</p>
    </div>

    <!-- Success -->
    <div *ngIf="successMessage" class="mb-4 p-4 bg-green-50 border border-green-200 rounded-xl text-green-700 text-sm flex gap-2 items-center">
      <svg class="w-5 h-5 flex-shrink-0" fill="currentColor" viewBox="0 0 20 20">
        <path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zm3.707-9.293a1 1 0 00-1.414-1.414L9 10.586 7.707 9.293a1 1 0 00-1.414 1.414l2 2a1 1 0 001.414 0l4-4z" clip-rule="evenodd"/>
      </svg>
      {{ successMessage }}
    </div>

    <!-- Error -->
    <div *ngIf="errorMessage" class="mb-4 p-4 bg-red-50 border border-red-200 rounded-xl text-red-700 text-sm flex gap-2 items-center">
      <svg class="w-5 h-5 flex-shrink-0" fill="currentColor" viewBox="0 0 20 20">
        <path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zM8.707 7.293a1 1 0 00-1.414 1.414L8.586 10l-1.293 1.293a1 1 0 101.414 1.414L10 11.414l1.293 1.293a1 1 0 001.414-1.414L11.414 10l1.293-1.293a1 1 0 00-1.414-1.414L10 8.586 8.707 7.293z" clip-rule="evenodd"/>
      </svg>
      {{ errorMessage }}
    </div>

    <!-- Resend success -->
    <div *ngIf="resendMessage" class="mb-4 p-3 bg-blue-50 border border-blue-200 rounded-xl text-blue-700 text-sm text-center">
      {{ resendMessage }}
    </div>

    <!-- 6 Digit Inputs -->
    <div class="flex gap-3 justify-center mb-6" (paste)="onPaste($event)">
      <input
        *ngFor="let digit of digits; let i = index"
        [id]="'digit-' + i"
        type="text"
        inputmode="numeric"
        maxlength="1"
        [value]="digit"
        (input)="onDigitInput(i, $event)"
        (keydown)="onDigitKeydown(i, $event)"
        [disabled]="isLoading || !!successMessage"
        class="w-12 h-14 text-center text-xl font-bold border-2 rounded-xl focus:outline-none focus:border-blue-500 transition disabled:opacity-50"
        [class.border-red-400]="errorMessage"
        [class.border-gray-300]="!errorMessage"
        [class.border-green-400]="successMessage"
      />
    </div>

    <!-- Submit Button -->
    <button
      (click)="onSubmit()"
      [disabled]="isLoading || !!successMessage || fullCode.length !== 6"
      class="w-full py-3 px-4 bg-blue-600 hover:bg-blue-700 text-white font-semibold rounded-xl transition disabled:opacity-60 disabled:cursor-not-allowed flex items-center justify-center gap-2 mb-4"
    >
      <svg *ngIf="isLoading" class="animate-spin w-4 h-4" fill="none" viewBox="0 0 24 24">
        <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"/>
        <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8v8H4z"/>
      </svg>
      {{ isLoading ? 'Verifying...' : 'Verify Email' }}
    </button>

    <!-- Resend -->
    <div class="text-center">
      <p class="text-gray-500 text-sm">Didn't receive the code?</p>
      <button
        (click)="resendCode()"
        [disabled]="isResending || resendCountdown > 0"
        class="mt-1 text-blue-600 hover:underline text-sm font-medium disabled:opacity-50 disabled:cursor-not-allowed"
      >
        <span *ngIf="isResending">Sending...</span>
        <span *ngIf="!isResending && resendCountdown > 0">Resend in {{ resendCountdown }}s</span>
        <span *ngIf="!isResending && resendCountdown === 0">Resend code</span>
      </button>
    </div>

    <p class="text-center mt-6 text-sm text-gray-500">
      <a routerLink="/login" class="text-blue-600 hover:underline font-medium">Back to Login</a>
    </p>

  </div>
</div>
