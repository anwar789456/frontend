<div class="min-h-screen bg-white">
  <app-sidebar></app-sidebar>
  <main class="ml-64 overflow-hidden p-0">
    <router-outlet></router-outlet>
  </main>
</div>

<!-- Multiple-login conflict dialog -->
@if (showConflictDialog) {
  <div class="fixed inset-0 z-50 flex items-center justify-center bg-black/60 backdrop-blur-sm">
    <div class="bg-white rounded-2xl shadow-2xl p-8 max-w-sm w-full mx-4 text-center animate-fade-in">
      <div class="flex items-center justify-center w-16 h-16 bg-amber-100 rounded-full mx-auto mb-5">
        <svg xmlns="http://www.w3.org/2000/svg" class="w-8 h-8 text-amber-500" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M12 9v2m0 4h.01M10.29 3.86L1.82 18a2 2 0 001.71 3h16.94a2 2 0 001.71-3L13.71 3.86a2 2 0 00-3.42 0z"/>
        </svg>
      </div>
      <h2 class="text-xl font-bold text-gray-800 mb-3">Another Login Detected</h2>
      <p class="text-gray-500 text-sm leading-relaxed mb-7">
        Your account was accessed from another device or browser.
        For your security, this session will now be closed.
      </p>
      <button
        (click)="onConflictAcknowledged()"
        class="w-full bg-blue-600 hover:bg-blue-700 text-white font-semibold py-3 rounded-xl transition-colors focus:outline-none focus:ring-2 focus:ring-blue-400 focus:ring-offset-2">
        OK, Log Me Out
      </button>
    </div>
  </div>
}
