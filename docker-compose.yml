services:
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    image: minolingo-frontend:local
    container_name: minolingo-frontend
    ports:
      - "8081:80"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped

  jenkins:
    build:
      context: ./jenkins
      dockerfile: Dockerfile
    image: minolingo-jenkins:lts-jdk21-node24
    container_name: minolingo-jenkins
    user: root
    ports:
      - "8082:8080"
      - "50000:50000"
    volumes:
      - jenkins_home:/var/jenkins_home
      - /var/run/docker.sock:/var/run/docker.sock
    restart: unless-stopped

  sonarqube:
    image: sonarqube:community
    container_name: minolingo-sonarqube
    ports:
      - "9000:9000"
    environment:
      SONAR_ES_BOOTSTRAP_CHECKS_DISABLE: "true"
    volumes:
      - sonarqube_data:/opt/sonarqube/data
      - sonarqube_extensions:/opt/sonarqube/extensions
      - sonarqube_logs:/opt/sonarqube/logs
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:v2.55.1
    container_name: minolingo-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    restart: unless-stopped
    depends_on:
      - nginx-exporter

  grafana:
    image: grafana/grafana:11.3.0
    container_name: minolingo-grafana
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
    restart: unless-stopped
    depends_on:
      - prometheus

  nginx-exporter:
    image: nginx/nginx-prometheus-exporter:1.3.0
    container_name: minolingo-nginx-exporter
    command:
      - -nginx.scrape-uri=http://frontend/nginx_status
    ports:
      - "9113:9113"
    restart: unless-stopped
    depends_on:
      - frontend

volumes:
  jenkins_home:
  sonarqube_data:
  sonarqube_extensions:
  sonarqube_logs:
  prometheus_data:
  grafana_data:
